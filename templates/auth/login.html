{% extends "base.html" %}

{% block title %}Login - Ubuyu Marketplace{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto; padding: 2rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Login to Ubuyu</h2>
    
    <form method="POST" style="display: flex; flex-direction: column;">
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="remember"> Remember me
            </label>
        </div>
        
        <button type="submit" class="btn btn-lg btn-primary" style="margin-top: 1rem;">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem;">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up here</a>
    </p>
</div>
{% endblock %}
