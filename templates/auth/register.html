{% extends "base.html" %}

{% block title %}Register - Ubuyu Marketplace{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto; padding: 2rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Create Your Account</h2>
    
    <form method="POST" style="display: flex; flex-direction: column;">
        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        
        <div class="form-group">
            <label for="password_confirm">Confirm Password *</label>
            <input type="password" id="password_confirm" name="password_confirm" required minlength="6">
        </div>
        
        <div class="form-group">
            <label for="role">I am a:</label>
            <select id="role" name="role" required>
                <option value="customer">Customer</option>
                <option value="vendor">Vendor</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-lg btn-primary" style="margin-top: 1rem;">Sign Up</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
    </p>
</div>
{% endblock %}
