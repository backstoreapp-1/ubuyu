{% extends "base.html" %}

{% block title %}Contact Support - Ubuyu{% endblock %}

{% block content %}
<div class="container">
    <div style="max-width: 900px; margin: 2rem auto;">
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>💬 Support Chat</h2>
            <p style="color: #999;">Send a message to our support team</p>
        </div>
        
        <!-- Chat -->
        <div style="background: white; border-radius: 8px; box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column; height: 600px;">
            <!-- Messages -->
            <div id="messagesArea" style="flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--light-gray); display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999; text-align: center;">
                    <div>
                        <p style="font-size: 2rem; margin: 0;">💬</p>
                        <p>Send a message to get started</p>
                    </div>
                </div>
            </div>
            
            <!-- Input -->
            <div style="padding: 1rem; border-top: 1px solid var(--border-gray); background: white;">
                <form id="messageForm" onsubmit="sendMessage(event)" style="display: flex; gap: 0.5rem;">
                    <textarea id="messageInput" placeholder="Type your message..." style="flex: 1; padding: 0.75rem; border: 1px solid var(--border-gray); border-radius: 4px; resize: none; height: 50px; font-family: inherit; font-size: 0.9rem;"></textarea>
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 1.5rem; white-space: nowrap;">Send</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const adminId = 1; // Admin user ID
let socket = null;

document.addEventListener('DOMContentLoaded', function() {
    socket = io();
    
    socket.on('connect', function() {
        console.log('✅ Connected to support');
        socket.emit('join_admin_support');
    });
    
    socket.on('new_message', function(data) {
        if (data.is_admin_reply) {
            addMessage(data.content, data.timestamp, false);
        }
    });
    
    socket.on('error', function(data) {
        alert('Error: ' + data.msg);
    });
});

function sendMessage(event) {
    event.preventDefault();
    const content = document.getElementById('messageInput').value.trim();
    if (!content) return;
    
    socket.emit('send_message', {
        receiver_id: adminId,
        content: content,
        type: 'support'
    });
    
    addMessage(content, new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: false}), true);
    document.getElementById('messageInput').value = '';
}

function addMessage(content, time, isCustomer = false) {
    const area = document.getElementById('messagesArea');
    
    // Remove placeholder on first message
    if (area.children.length === 1 && area.querySelector('p:first-child')) {
        area.innerHTML = '';
    }
    
    const div = document.createElement('div');
    div.style.cssText = `display: flex; ${isCustomer ? 'justify-content: flex-end;' : ''} gap: 0.5rem; align-items: flex-end;`;
    div.innerHTML = `
        <div style="max-width: 60%; background: ${isCustomer ? 'var(--primary-orange)' : 'white'}; color: ${isCustomer ? 'white' : 'var(--dark-gray)'}; padding: 0.75rem 1rem; border-radius: 8px;">
            <p style="margin: 0; word-wrap: break-word;">${escapeHtml(content)}</p>
            <small style="opacity: 0.7; font-size: 0.75rem; display: block; margin-top: 0.25rem;">${time}</small>
        </div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
