{% extends "base.html" %}

{% block title %}Edit Product - Ubuyu Marketplace{% endblock %}

{% block content %}
<div class="container">
    <div class="vendor-section">
        <h1>Edit Product</h1>
        
        <div class="product-form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" name="name" value="{{ product.name }}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" required>{{ product.description }}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (KSh) *</label>
                        <input type="number" id="price" name="price" step="0.01" value="{{ product.price }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock">Stock Quantity *</label>
                        <input type="number" id="stock" name="stock" value="{{ product.stock }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="ubuyu" {% if product.category == 'ubuyu' %}selected{% endif %}>Ubuyu</option>
                        <option value="achari" {% if product.category == 'achari' %}selected{% endif %}>Achari</option>
                        <option value="snacks" {% if product.category == 'snacks' %}selected{% endif %}>Snacks</option>
                        <option value="other" {% if product.category == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">Change Primary Image</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                {% if product.images %}
                <div class="form-group">
                    <label>Existing Additional Images</label>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        {% for img in product.images %}
                        <img src="/{{ upload_folder }}/{{ img.image }}" width="80" style="border:1px solid #ccc; border-radius:4px;">
                        {% endfor %}
                    </div>
                </div>
                {% endif %}
                <div class="form-group">
                    <label for="images">Upload More Images</label>
                    <input type="file" id="images" name="images" accept="image/*" multiple>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('vendor.products') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.vendor-section {
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
}

.vendor-section h1 {
    color: #d32f2f;
    margin-bottom: 30px;
}

.product-form-card {
    background: white;
    border-radius: 8px;
    padding: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-weight: bold;
    color: #555;
    margin-bottom: 8px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
    border-color: #d32f2f;
    outline: none;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 30px;
}

.form-actions .btn {
    flex: 1;
}
</style>
{% endblock %}
