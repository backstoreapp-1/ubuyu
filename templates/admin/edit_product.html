{% extends "base.html" %}

{% block title %}Edit Product - Admin - Ubuyu Marketplace{% endblock %}

{% block content %}
<div class="container">
    <div class="admin-section">
        <h1>Edit Product</h1>

        <div class="product-form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="vendor_id">Vendor *</label>
                    <select id="vendor_id" name="vendor_id" required>
                        {% for vendor in vendors %}
                        <option value="{{ vendor.id }}" {% if vendor.id == product.vendor_id %}selected{% endif %}>{{ vendor.store_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" name="name" value="{{ product.name }}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" required>{{ product.description }}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (KSh) *</label>
                        <input type="number" id="price" name="price" step="0.01" value="{{ product.price }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock">Stock Quantity *</label>
                        <input type="number" id="stock" name="stock" value="{{ product.stock }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="ubuyu" {% if product.category == 'ubuyu' %}selected{% endif %}>Ubuyu</option>
                        <option value="achari" {% if product.category == 'achari' %}selected{% endif %}>Achari</option>
                        <option value="snacks" {% if product.category == 'snacks' %}selected{% endif %}>Snacks</option>
                        <option value="other" {% if product.category == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="image">Change Primary Image</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                {% if product.images %}
                <div class="form-group">
                    <label>Existing Images</label>
                    <div class="existing-images">
                        {% for img in product.images %}
                        <div class="img-preview">
                            <img src="/{{ upload_folder }}/{{ img.image }}" alt="" width="80">
                        </div>
                        {% endfor %}
                    </div>
                </div>
                {% endif %}
                <div class="form-group">
                    <label for="images">Add More Images</label>
                    <input type="file" id="images" name="images" accept="image/*" multiple>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% include 'vendor/edit_product.html' %}
{% endblock %}
