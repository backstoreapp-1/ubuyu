{% extends "base.html" %}

{% block title %}Add Product - Admin - Ubuyu Marketplace{% endblock %}

{% block content %}
<div class="container">
    <div class="admin-section">
        <h1>Add New Product</h1>

        <div class="product-form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="vendor_id">Vendor *</label>
                    <select id="vendor_id" name="vendor_id" required>
                        <option value="">Select vendor</option>
                        {% for vendor in vendors %}
                        <option value="{{ vendor.id }}">{{ vendor.store_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (KSh) *</label>
                        <input type="number" id="price" name="price" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock">Stock Quantity *</label>
                        <input type="number" id="stock" name="stock" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="ubuyu">Ubuyu</option>
                        <option value="achari">Achari</option>
                        <option value="snacks">Snacks</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="image">Primary Image</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="images">Additional Images</label>
                    <input type="file" id="images" name="images" accept="image/*" multiple>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% include 'vendor/add_product.html' %}  {# reuse styles from vendor form #}
{% endblock %}
